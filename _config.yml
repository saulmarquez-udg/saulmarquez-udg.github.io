# Welcome to Jekyll!
# Configuración personalizada para el sitio académico de Saúl Márquez

# Basic Site Settings
locale                  : "es-MX" # Configurado en español de México
site_theme              : "default" # Estilo limpio y minimalista por defecto
title                   : "Matemático Anónimo"
title_separator         : "|"
name                    : &name "Saúl Márquez"
description             : &description "Profesor de asignatura - Universidad de Guadalajara"
url                     : "https://saulmarquez-udg.github.io"
baseurl                 : "" 
repository              : "saulmarquez-udg/saulmarquez-udg.github.io"

# Site Author - Barra lateral izquierda
author:
  # Información Biográfica
  avatar            : "profile.png" # Si subes una foto tuya a la carpeta raíz con este nombre, aparecerá aquí
  name              : "Saúl Márquez"
  pronouns          : # ej: "él/he"  
  bio               : "Profesor de asignatura Universidad de Guadalajara. Interesado en la docencia, divulgación y la investigación científica."
  location          : "Guadalajara, Jalisco, México"
  employer          : "Universidad de Guadalajara"
  uri               : # Tu página web alternativa si tuvieras una
  email             : "saul.marquez@academicos.udg.mx" # Cambia por tu correo real 

  # Perfiles Académicos (Si dejas alguno vacío con el símbolo #, no se mostrará el icono)
  academia          : # URL de Academia.edu
  arxiv             : # URL de tu perfil de arXiv
  googlescholar     : #"https://scholar.google.com/citations?user=PS_CX0AAAAAJ" # Reemplaza con tu ID real de Scholar
  orcid             : "https://orcid.org/0009-0002-3866-7620" # Reemplaza con tu enlace de ORCID
  researchgate      : # URL de tu perfil de ResearchGate
  scopus            : # URL de tu perfil de Scopus
  semantic          : # URL de Semantic Scholar

  # Repositorios y desarrollo
  github            : "saulmarquez-udg" # Tu usuario de GitHub

  # Redes Sociales (Opcional, eliminar el '#' si deseas usarlas)
  bluesky           : # Tu usuario de Bluesky
  linkedin          : # Tu usuario de LinkedIn
  twitter           : # Tu usuario de X/Twitter
  youtube           : matematicoanonimo

# Categorías de tus Publicaciones
publication_category:
  books:
    title: 'Libros'
  manuscripts:
    title: 'Artículos Científicos (Journals)'    
  conferences:
    title: 'Memorias de Congresos'

# Configuración de Lectura e Interfaz
teaser                   : 
breadcrumbs              : false 
words_per_minute         : 160
future                   : true
read_more                : "disabled" 
talkmap_link             : false      

# Comentarios e Integraciones (Desactivados por defecto para mantenerlo limpio)
comments:
  provider               : false
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "master"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"
atom_feed:
  hide                   : false    
  path                   : 


# SEO y Verificaciones de Motores de Búsqueda
google_site_verification :
bing_site_verification   :


# Analíticas de visitas (Por si en el futuro usas Google Analytics)
analytics:
  provider               : "false" 
  google:
    tracking_id          :


# Lectura y exclusión de Archivos del Sistema
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Procesamiento de Markdown y Renderizado de LaTeX
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  mathengine: mathjax


# Colecciones dinámicas de la plantilla (Docencia, Publicaciones, Charlas)
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/


# Configuraciones por defecto de las páginas
defaults:
  # Entradas de Blog
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
  # Páginas estáticas (_pages)
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # Secciones de clases (_teaching)
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
  # Secciones de artículos (_publications)
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false

# Configuración de Estilos SCSS
sass:
  sass_dir: _sass
  style: compressed 

# Parámetros de salida
permalink: /:categories/:title/
timezone: America/Mexico_City # Configurado con tu zona horaria para las publicaciones

# Plugins requeridos de GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archivos de etiquetas y categorías
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Compresión automática de HTML para que la web cargue rápido
compress_html:
  clippings: all
  ignore:
    envs: development
